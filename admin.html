<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Admin Panel</title>

<style>
.glass{background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);}
.card{background:rgba(255,255,255,0.7);border-radius:16px;}
*{transition:0.25s;}
</style>
</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->
<div class="flex justify-between items-center p-4 glass shadow">

  <div class="flex items-center gap-3">
    <button id="menuBtn" class="md:hidden text-xl">☰</button>
    <h1 class="font-semibold text-lg">Admin Dashboard</h1>
  </div>

  <div class="text-right text-sm">
    <div id="adminName" class="font-semibold">Admin</div>
    <div id="adminUID" class="text-xs text-gray-500"></div>
  </div>

</div>

<!-- SIDEBAR -->
<div id="sidebar"
class="fixed md:relative top-0 left-0 h-full w-64 bg-white p-4 shadow transform -translate-x-full md:translate-x-0 z-50">

  <div class="flex justify-end md:hidden mb-4">
    <button id="closeSidebar">✕</button>
  </div>

  <div class="flex flex-col gap-3">
    <button class="bg-blue-500 text-white p-2 rounded-xl">Dashboard</button>
    <button class="bg-gray-100 p-2 rounded-xl">Leads</button>
    <button class="bg-gray-100 p-2 rounded-xl">Agents</button>
    <button class="bg-gray-100 p-2 rounded-xl">Analytics</button>
  </div>

</div>

<div id="overlay" class="fixed inset-0 bg-black/30 hidden md:hidden"></div>

<!-- MAIN -->
<div class="p-4 md:ml-64">

  <!-- STATS -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">

    <div class="card p-4">
      <div class="text-sm text-gray-500">Called</div>
      <div id="calledCount" class="text-xl font-semibold">0</div>
    </div>

    <div class="card p-4">
      <div class="text-sm text-gray-500">Pending</div>
      <div id="pendingCount" class="text-xl font-semibold">0</div>
    </div>

    <div class="card p-4">
      <div class="text-sm text-gray-500">Closed</div>
      <div id="closedCount" class="text-xl font-semibold">0</div>
    </div>

    <div class="card p-4">
      <div class="text-sm text-gray-500">Assigned</div>
      <div id="assignedCount" class="text-xl font-semibold">0</div>
    </div>

  </div>

  <!-- LEADS -->
  <div id="leadList" class="space-y-3"></div>

</div>

<!-- ASSIGN MODAL -->
<div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center">

  <div class="bg-white p-4 rounded-xl w-80">

    <div class="flex justify-between mb-3">
      <h2 class="font-semibold">Assign Lead</h2>
      <button onclick="closeModal()">✕</button>
    </div>

    <select id="agentSelect" class="w-full border p-2 rounded-lg mb-3"></select>

    <button onclick="confirmAssign()" class="w-full bg-blue-500 text-white py-2 rounded-lg">
      Assign
    </button>

  </div>

</div>

<script type="module">

/* 🔥 FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import {
  getFirestore,collection,getDocs,updateDoc,doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfg_CmR3fWXz7U7R35nhRNCC243CqBXEQ",
  authDomain: "crm-69c8a.firebaseapp.com",
  projectId: "crm-69c8a",
  storageBucket: "crm-69c8a.firebasestorage.app",
  messagingSenderId: "309785361435",
  appId: "1:309785361435:web:45bb7e8f74708cef410cbe"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let leads=[];
let agents=[];
let selectedLead=null;

/* AUTH */
onAuthStateChanged(auth,user=>{
  if(!user) location.href="auth.html";

  adminUID.innerText=user.uid;
});

/* LOAD DATA */
async function load(){
  const snap = await getDocs(collection(db,"contacts"));
  leads = snap.docs.map(d=>({id:d.id,...d.data()}));

  const usersSnap = await getDocs(collection(db,"users"));
  agents = usersSnap.docs.map(d=>({id:d.id,...d.data()}));

  render();
  updateStats();
  loadAgents();
}

load();

/* STATS */
function updateStats(){
  calledCount.innerText = leads.filter(l=>l.status==="called").length;
  pendingCount.innerText = leads.filter(l=>l.status==="not_answered").length;
  closedCount.innerText = leads.filter(l=>l.status==="closed").length;
  assignedCount.innerText = leads.filter(l=>l.assignedTo).length;
}

/* RENDER */
function render(){
  leadList.innerHTML="";

  leads.forEach(l=>{
    leadList.innerHTML+=`
    <div class="card p-4">

      <div class="font-semibold">${l.phone}</div>

      <div class="flex gap-2 mt-3">

        <button onclick="openModal('${l.id}')"
          class="flex-1 bg-blue-500 text-white py-2 rounded-xl">
          Assign
        </button>

        <button onclick="deleteLead('${l.id}')"
          class="flex-1 bg-red-500 text-white py-2 rounded-xl">
          Delete
        </button>

      </div>

    </div>`;
  });
}

/* DELETE */
window.deleteLead = async (id)=>{
  alert("Delete logic connect later");
};

/* MODAL */
window.openModal = (id)=>{
  selectedLead=id;
  modal.classList.remove("hidden");
};

window.closeModal = ()=>{
  modal.classList.add("hidden");
};

/* LOAD AGENTS */
function loadAgents(){
  agentSelect.innerHTML="";
  agents.forEach(a=>{
    agentSelect.innerHTML+=`<option value="${a.id}">${a.name||a.id}</option>`;
  });
}

/* ASSIGN */
window.confirmAssign = async ()=>{
  const agent = agentSelect.value;

  await updateDoc(doc(db,"contacts",selectedLead),{
    assignedTo:agent
  });

  closeModal();
  load();
};

/* MENU */
menuBtn.onclick=()=>{sidebar.classList.remove("-translate-x-full");overlay.classList.remove("hidden");};
closeSidebar.onclick=overlay.onclick=()=>{
  sidebar.classList.add("-translate-x-full");
  overlay.classList.add("hidden");
};

</script>

</body>
  </html>
